name: API Managed Database Parity Execute

on:
  workflow_dispatch:
    inputs:
      target:
        description: Backend environment.
        type: choice
        required: true
        options:
          - staging
          - production
      execution_label:
        description: Stable parity execution label.
        type: string
        required: true
      schema_name:
        description: PostgreSQL schema name.
        type: string
        required: false
        default: goal_vault_api
      parity_plan_artifact:
        description: Managed database parity plan artifact to download.
        type: string
        required: true
      parity_plan_run_id:
        description: Workflow run ID that produced parity_plan_artifact.
        type: string
        required: true
      snapshot_artifact:
        description: API data snapshot artifact to download.
        type: string
        required: true
      snapshot_run_id:
        description: Workflow run ID that produced snapshot_artifact.
        type: string
        required: true
      target_reference:
        description: Non-secret managed database target reference.
        type: string
        required: false
      confirm_execute:
        description: Type compare to run parity against the target database.
        type: string
        required: true

permissions:
  contents: read
  actions: read

concurrency:
  group: api-managed-database-parity-execute-${{ inputs.target }}
  cancel-in-progress: false

env:
  CI: true
  FORCE_COLOR: 1
  API_DATABASE_PARITY_EXECUTION_TARGET: ${{ inputs.target }}
  API_DATABASE_PARITY_EXECUTION_LABEL: ${{ inputs.execution_label }}
  API_DATABASE_PARITY_SCHEMA_NAME: ${{ inputs.schema_name }}
  API_DATABASE_PARITY_TARGET_REFERENCE: ${{ inputs.target_reference }}
  API_DATABASE_PARITY_CONFIRM_EXECUTE: ${{ inputs.confirm_execute }}
  API_DATABASE_URL: ${{ secrets.API_DATABASE_URL }}
  API_DATABASE_PARITY_EXECUTION_DIR: artifacts/parity-execute

jobs:
  api-managed-database-parity-execute:
    name: Execute ${{ inputs.target }} API managed database parity
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.target }}
    steps:
      - name: Validate confirmation
        if: ${{ inputs.confirm_execute != 'compare' }}
        run: |
          echo "Parity execution requires confirm_execute=compare."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/setup-pnpm

      - name: Download managed database parity plan artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.parity_plan_artifact }}
          run-id: ${{ inputs.parity_plan_run_id }}
          github-token: ${{ github.token }}
          path: artifacts/parity-plan

      - name: Download API data snapshot artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.snapshot_artifact }}
          run-id: ${{ inputs.snapshot_run_id }}
          github-token: ${{ github.token }}
          path: artifacts/source-snapshot

      - name: Resolve parity plan path
        id: parity-paths
        shell: bash
        run: |
          parity_plan="$(find artifacts/parity-plan -name '*.json' -type f | head -n 1)"
          if [ -z "$parity_plan" ] || [ ! -f "$parity_plan" ]; then
            echo "Parity plan JSON was not found."
            exit 1
          fi
          echo "parity_plan=$parity_plan" >> "$GITHUB_OUTPUT"

      - name: Execute API managed database parity
        id: parity-execute
        env:
          API_DATABASE_PARITY_PLAN: ${{ steps.parity-paths.outputs.parity_plan }}
          API_DATABASE_PARITY_SOURCE_SNAPSHOT: artifacts/source-snapshot
        run: pnpm api:database:parity:execute

      - name: Upload parity execution result
        uses: actions/upload-artifact@v4
        with:
          name: pocket-vault-api-managed-database-parity-execute-${{ inputs.target }}
          path: ${{ steps.parity-execute.outputs.result_path }}
          if-no-files-found: error
